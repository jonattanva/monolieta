<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Monolieta</title>
    <style>
        @font-face {
            font-family: 'Roboto';
            font-style: normal;
            font-weight: 400;
            src:
                local(Roboto),
                url('/font/Roboto-Light.ttf') format('truetype');
        }

        :root {
            --color-primary: #6200ee;
            --color-primary-light: #9951ff;
            --color-primary-dark: rgba(98, 0, 238, 0.16);
            --color-secondary: hsl(220, 13%, 15%);
            --color-secondary-light: hsl(220, 13%, 25%);
            --color-secondary-dark: hsl(220, 13%, 20%);
            --color-font: hsl(0, 0%, 90%);
            --color-font-light: hsl(220, 13%, 65%);
            --color-font-dark: hsl(220, 13%, 50%);
            --color-green: #15ff0d;
            --color-red: #e60013;
        }

        body {
            color: hsl(0, 0%, 90%);
            color: var(--color-font, hsl(0, 0%, 90%));
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            font-weight: 400;
            height: 100%;
            line-height: 1.5;
            margin: 0;
            overflow-x: hidden;
            overflow-y: hidden;
            text-align: left;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="main"></div>
</body>

</html>
